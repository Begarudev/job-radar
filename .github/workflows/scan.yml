name: scan

on:
  schedule:
    - cron: "0 */4 * * *" # every 4 hours
  workflow_dispatch:

# Serialize against other workflows that write to data/.
concurrency:
  group: data-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run scan
        run: bun run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit if changed
        run: |
          git config user.name "job-radar-bot"
          git config user.email "job-radar-bot@users.noreply.github.com"
          if git diff --quiet data/feed.json; then
            echo "no change"
            exit 0
          fi
          git add data/feed.json
          git commit -m "feed: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          # Defence in depth: rebase on top of any newer commits, retry once.
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            sleep $((attempt * 2))
          done
          echo "push failed after retries"
          exit 1
