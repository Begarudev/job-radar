name: events

on:
  schedule:
    - cron: "30 6 * * *" # daily 06:30 UTC (~12:00 IST). Offset from scan/now.
  workflow_dispatch:

concurrency:
  group: data-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  events:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Refresh events.json
        run: bun run events
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit if changed
        run: |
          git config user.name "job-radar-bot"
          git config user.email "job-radar-bot@users.noreply.github.com"
          if git diff --quiet data/events.json; then
            echo "no change"
            exit 0
          fi
          git add data/events.json
          git commit -m "events: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            sleep $((attempt * 2))
          done
          echo "push failed after retries"
          exit 1
