name: engagement

on:
  schedule:
    # 7:30pm IST (PT-morning peak) = 14:00 UTC
    - cron: "0 14 * * *"
    # 8:30am IST (PT-evening peak) = 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  engagement:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run engagement nudge
        run: bun run engagement
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "job-radar-bot"
          git config user.email "job-radar-bot@users.noreply.github.com"
          if git diff --quiet data/engagement.json 2>/dev/null; then
            echo "no change"
            exit 0
          fi
          git add data/engagement.json
          git commit -m "engagement: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            sleep $((attempt * 2))
          done
          echo "push failed after retries"
          exit 1
